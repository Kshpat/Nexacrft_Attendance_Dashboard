<h2 class="font-headline font-semibold text-2xl tracking-tight text-on-surface">Nexacrft</h2>
</div>
<div class="mb-8">
<h3 class="font-headline font-semibold text-2xl text-on-surface mb-2">Sign In</h3>
<p class="text-on-surface-variant text-sm">Please enter your credentials to continue.</p>
</div>
<form class="space-y-6" id="loginForm">
<!-- Role Selection Toggle -->
<div class="flex items-center justify-between p-2 rounded-xl neo-raised bg-background mb-6">
<button class="flex-1 py-2 px-4 rounded-lg font-medium text-sm transition-all duration-300 neo-inset text-primary" id="btnEmployee" onclick="toggleRole('employee')" type="button">
                        Employee
                    </button>
<button class="flex-1 py-2 px-4 rounded-lg font-medium text-sm transition-all duration-300 text-on-surface-variant hover:text-primary" id="btnAdmin" onclick="toggleRole('admin')" type="button">
                        Admin
                    </button>
</div>
<input id="loginRole" name="role" type="hidden" value="employee">
<!-- Username Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface ml-1" for="username">Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl">person</span>
</div>
<input class="w-full pl-12 pr-4 py-3 rounded-xl text-on-surface font-body neo-input placeholder:text-outline" id="username" name="username" placeholder="Enter your username" required="" type="text">
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block font-label text-sm font-medium text-on-surface" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-tertiary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-3 rounded-xl text-on-surface font-body neo-input placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined text-xl" id="visibilityIcon">visibility_off</span>
</button>
</div>
</div>
<!-- Keep me logged in -->
<div class="flex items-center ml-1 pt-2">
<!-- Custom Neomorphic Checkbox Container -->
<label class="flex items-center cursor-pointer relative">
<input class="sr-only peer" id="remember" type="checkbox">
<div class="w-6 h-6 rounded-md neo-raised bg-background flex items-center justify-center mr-3 peer-checked:neo-inset peer-checked:text-primary text-transparent transition-all duration-200">
<span class="material-symbols-outlined text-sm font-bold opacity-0 peer-checked:opacity-100" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-sm font-medium text-on-surface-variant select-none">Keep me logged in</span>
</label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full py-4 rounded-xl neo-raised neo-button bg-background text-primary font-semibold text-lg flex items-center justify-center gap-2 transition-all group" type="submit">
                        Sign In
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant font-medium">
                    Don't have an account? 
                    <a class="text-primary hover:text-tertiary font-semibold transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-full after:h-0.5 after:bg-primary after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:origin-left" href="#">Sign Up</a>
</p>
</div>
</div>
</main>
<script>
        // Role Toggle Logic
        function toggleRole(role) {
            const btnEmployee = document.getElementById('btnEmployee');
            const btnAdmin = document.getElementById('btnAdmin');
            const roleInput = document.getElementById('loginRole');
            
            roleInput.value = role;

            if (role === 'employee') {
                // Set Employee Active
                btnEmployee.classList.add('neo-inset', 'text-primary');
                btnEmployee.classList.remove('text-on-surface-variant', 'hover:text-primary');
                
                // Set Admin Inactive
                btnAdmin.classList.remove('neo-inset', 'text-primary');
                btnAdmin.classList.add('text-on-surface-variant', 'hover:text-primary');
            } else {
                // Set Admin Active
                btnAdmin.classList.add('neo-inset', 'text-primary');
                btnAdmin.classList.remove('text-on-surface-variant', 'hover:text-primary');
                
                // Set Employee Inactive
                btnEmployee.classList.remove('neo-inset', 'text-primary');
                btnEmployee.classList.add('text-on-surface-variant', 'hover:text-primary');
            }
        }

        // Password Visibility Toggle
        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('visibilityIcon');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.textContent = 'visibility';
            } else {
                pwdInput.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }

        // Form Submit Simulation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.classList.add('neo-inset');
            btn.classList.remove('neo-raised');
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Logging in...`;
            
            setTimeout(() => {
                // Reset (Simulation over)
                btn.classList.remove('neo-inset');
                btn.classList.add('neo-raised');
                btn.innerHTML = originalContent;
                // Add routing logic here in a real app
            }, 1500);
        });
    </script>
